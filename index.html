<style>
  :root {
    --panel: rgba(10, 16, 34, 0.72);
    --panel-border: rgba(120, 160, 255, 0.22);
    --text: #dfe7ff;
    --muted: #8ea3d6;
    --accent: #7fb0ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #01030a;
    font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    color: var(--text);
    user-select: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    font-size: 13px;
    line-height: 1.5;
  }

  /* 패널 헤더(드래그 핸들 + 최소화) */
  .ph { display: flex; align-items: center; gap: 7px; cursor: grab;
    user-select: none; touch-action: none; margin: 0 0 10px; }
  .ph:active { cursor: grabbing; }
  .ph .grip { color: var(--muted); font-size: 13px; }
  .ph .pt { font-size: 13px; font-weight: 700; letter-spacing: .3px; flex: 1; white-space: nowrap; }
  .ph .pmin { width: 24px; height: 24px; padding: 0; border-radius: 7px; flex: 0 0 24px;
    display: flex; align-items: center; justify-content: center; font-size: 15px; line-height: 1; }
  .panel.collapsed { padding: 6px 10px; width: auto !important; max-width: none !important; }
  .panel.collapsed > :not(.ph) { display: none !important; }
  .panel.collapsed .ph { margin: 0; }
  #timePanel .ph { margin: 0; }
  #timePanel .ph .pt { flex: 0 0 auto; }

  #infoPanel { top: 14px; left: 14px; max-width: 280px; }
  #infoPanel h1 {
    margin: 0 0 8px; font-size: 16px; letter-spacing: .3px;
    display: flex; align-items: center; gap: 8px;
  }
  #infoPanel h1 .dot { width: 9px; height: 9px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #9cc0ff 60%, #3a6bff);
    box-shadow: 0 0 10px #6f9cff; }
  .stat { display: flex; justify-content: space-between; gap: 12px; }
  .stat span:first-child { color: var(--muted); }
  .stat b { font-weight: 600; font-variant-numeric: tabular-nums; }
  #daynote { margin-top: 8px; font-size: 12px; color: #ffd59a; display: none; }

  #ctrlPanel { top: 14px; right: 14px; width: 268px; }
  #ctrlPanel h2 { margin: 0 0 10px; font-size: 13px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .row { display: flex; gap: 8px; }
  select, input, button {
    font-family: inherit; font-size: 13px; color: var(--text);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(140,170,255,0.25);
    border-radius: 8px; padding: 7px 9px; width: 100%;
  }
  select { color-scheme: dark; }             /* 네이티브 드롭다운을 다크 모드로 */
  select option {
    background-color: #0c1428;               /* 목록 배경 어둡게 */
    color: var(--text);
  }
  select option:checked { background-color: #1d3a66; }
  input[type="number"] { -moz-appearance: textfield; }
  button { cursor: pointer; transition: background .15s, border-color .15s; }
  button:hover { background: rgba(127,176,255,0.22); border-color: var(--accent); }
  button.primary { background: rgba(127,176,255,0.18); border-color: rgba(127,176,255,0.5); }
  input[type="range"] { padding: 0; accent-color: var(--accent); }
  .inline { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .inline input[type="checkbox"] { width: auto; }

  #globeBox {
    width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(140,170,255,0.25);
    background: radial-gradient(circle at 50% 40%, #0a1428, #030610 75%);
    cursor: grab; position: relative;
  }
  #globeBox canvas { display:block; width:100% !important; height:100% !important; }
  #globeHint { position:absolute; bottom:6px; left:0; right:0; text-align:center;
    font-size:10px; color:var(--muted); pointer-events:none; opacity:.8; }

  #timePanel { bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
  #timePanel .tbtn { width: auto; padding: 6px 12px; white-space: nowrap; }
  #play24 { width: 118px; flex: 0 0 118px; }   /* 재생↔정지 토글 시 폭 고정 */
  #offset { width: 220px; }
  #timePanel .clock { font-variant-numeric: tabular-nums; width: 80px; flex: 0 0 80px; text-align: center;
    font-size: 15px; letter-spacing: .5px; white-space: nowrap; }

  #tooltip {
    position: absolute; pointer-events: none; opacity: 0;
    transform: translate(-50%, -120%);
    background: rgba(6,10,26,0.92); border: 1px solid rgba(140,170,255,0.4);
    border-radius: 10px; padding: 9px 12px; min-width: 150px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.55); transition: opacity .12s;
    z-index: 50;
  }
  #tooltip .name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  #tooltip .con { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  #tooltip .t-row { display: flex; justify-content: space-between; gap: 14px; font-size: 12px; }
  #tooltip .t-row span:first-child { color: var(--muted); }
  #tooltip .swatch { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }

  #help { bottom: 14px; right: 14px; font-size: 12px; color: var(--muted); max-width: 210px; }
  #help b { color: var(--text); }
  .credit { opacity: .55; font-size: 11px; margin-top: 6px; }
  @media (max-width: 720px){
    .panel { font-size: 12px; padding: 10px 12px; }
    #ctrlPanel { width: 208px; top: 10px; right: 10px; }
    #infoPanel { max-width: 200px; top: 10px; left: 10px; }
    #timePanel { flex-wrap: wrap; justify-content: center; max-width: 94vw;
      bottom: 10px; gap: 8px; padding: 8px 10px; }
    #offset { width: 130px; flex: 1 1 120px; }
    #help { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="infoPanel" class="panel">
  <div class="stat"><span>관측지</span><b id="locName">서울</b></div>
  <div class="stat"><span>좌표</span><b id="locCoord">37.6°N 127.0°E</b></div>
  <div class="stat"><span>지방시(근사)</span><b id="localTime">--:--</b></div>
  <div class="stat"><span>항성시(LST)</span><b id="lst">--</b></div>
  <div class="stat"><span>태양 고도</span><b id="sunAlt">--</b></div>
  <div class="stat"><span>보이는 별</span><b id="starCount">--</b></div>
  <div id="daynote">☀ 지금 이 위치는 낮/황혼입니다 — 실제로는 별이 거의 보이지 않아요.</div>
</div>

<div id="ctrlPanel" class="panel">
  <div class="field">
    <label>지구본에서 선택 — 드래그 회전 · 클릭 선택</label>
    <div id="globeBox"><div id="globeHint">🌍 클릭한 지점이 관측지가 됩니다</div></div>
  </div>
  <div class="field">
    <label>도시 프리셋</label>
    <select id="citySelect"></select>
  </div>
  <div class="row">
    <div class="field" style="flex:1">
      <label>위도 (−90~90)</label>
      <input type="number" id="latInput" step="0.1" min="-90" max="90" value="37.57" />
    </div>
    <div class="field" style="flex:1">
      <label>경도 (−180~180)</label>
      <input type="number" id="lonInput" step="0.1" min="-180" max="180" value="126.98" />
    </div>
  </div>
  <div class="field">
    <button id="applyLoc" class="primary">이 좌표로 관측하기</button>
  </div>
  <div class="field">
    <button id="geoBtn">📍 내 위치 사용</button>
  </div>
  <div class="inline" style="margin-top:4px">
    <input type="checkbox" id="constChk" checked />
    <label for="constChk" style="margin:0;cursor:pointer">별자리 선 표시</label>
  </div>
  <div class="inline" style="margin-top:4px">
    <input type="checkbox" id="alwaysStars" checked />
    <label for="alwaysStars" style="margin:0;cursor:pointer">낮에도 별 항상 표시</label>
  </div>
</div>

<div id="timePanel" class="panel">
  <button class="tbtn primary" id="play24">▶ 24시간 재생</button>
  <div class="inline"><input type="checkbox" id="trailChk" /><label for="trailChk" style="margin:0;cursor:pointer">궤적</label></div>
  <span style="width:1px;height:22px;background:rgba(140,170,255,.25)"></span>
  <button class="tbtn" id="nowBtn">지금</button>
  <button class="tbtn" id="minus">−1시간</button>
  <div class="clock" id="clock">--:--:--</div>
  <button class="tbtn" id="plus">+1시간</button>
  <input type="range" id="offset" min="-24" max="24" step="0.05" value="0" />
  <select id="speed" class="tbtn" style="padding:6px 8px">
    <option value="1">실시간</option>
    <option value="60">60×</option>
    <option value="600">600×</option>
    <option value="1440">1440× (24h/분)</option>
    <option value="3600">3600×</option>
  </select>
</div>

<div id="help" class="panel">
  <b>드래그</b> — 시야 회전<br/>
  <b>휠</b> — 확대 / 축소<br/>
  <b>별에 마우스</b> — 정보 보기<br/>
  <div class="credit">별 위치는 관측지·시각으로 실시간 계산됩니다.</div>
</div>

<div id="tooltip">
  <div class="name" id="tt-name">—</div>
  <div class="con" id="tt-con">—</div>
  <div class="t-row"><span>겉보기 등급</span><b id="tt-mag">—</b></div>
  <div class="t-row"><span>분광형</span><b id="tt-spec">—</b></div>
  <div class="t-row"><span>고도</span><b id="tt-alt">—</b></div>
  <div class="t-row"><span>방위</span><b id="tt-az">—</b></div>
</div>

const DEG = Math.PI/180, RAD = 180/Math.PI;
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function specColor(spec){
  const c = (spec||"A")[0].toUpperCase();
  switch(c){
    case 'O': return [0.61,0.69,1.0];
    case 'B': return [0.67,0.75,1.0];
    case 'A': return [0.79,0.84,1.0];
    case 'F': return [0.97,0.97,1.0];
    case 'G': return [1.0,0.96,0.90];
    case 'K': return [1.0,0.82,0.63];
    case 'M': return [1.0,0.70,0.42];
    default:  return [1.0,1.0,1.0];
  }
}
function specHex(spec){ const c=specColor(spec); return '#'+c.map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join(''); }

function julianDay(ms){ return ms/86400000 + 2440587.5; }
function localSiderealDeg(ms, lonDeg){
  const d = julianDay(ms) - 2451545.0;
  let gmst = 280.46061837 + 360.98564736629*d;
  gmst = ((gmst % 360)+360)%360;
  return (((gmst + lonDeg) % 360)+360)%360;
}
// 적경/적위 -> 고도/방위 (방위: 북=0, 동=90)
function equToHor(raDeg, decDeg, lstDeg, latDeg){
  const dec = decDeg*DEG, lat = latDeg*DEG;
  const H = (lstDeg - raDeg)*DEG;
  const sinAlt = Math.sin(dec)*Math.sin(lat) + Math.cos(dec)*Math.cos(lat)*Math.cos(H);
  const alt = Math.asin(clamp(sinAlt,-1,1));
  let cosA = (Math.sin(dec) - Math.sin(alt)*Math.sin(lat)) / (Math.cos(alt)*Math.cos(lat));
  cosA = clamp(cosA,-1,1);
  let A = Math.acos(cosA);
  if (Math.sin(H) > 0) A = 2*Math.PI - A;
  return { alt: alt*RAD, az: A*RAD };
}
// 저정밀 태양 위치
function sunEqu(ms){
  const d = julianDay(ms) - 2451545.0;
  const L = (280.460 + 0.9856474*d)*DEG;
  const g = (357.528 + 0.9856003*d)*DEG;
  const lambda = L + (1.915*Math.sin(g) + 0.020*Math.sin(2*g))*DEG;
  const eps = (23.439 - 0.0000004*d)*DEG;
  const ra = Math.atan2(Math.cos(eps)*Math.sin(lambda), Math.cos(lambda));
  const dec = Math.asin(Math.sin(eps)*Math.sin(lambda));
  return { ra: ((ra*RAD)+360)%360, dec: dec*RAD };
}
// 저정밀 달 위치 + 위상 (Schlyter 궤도요소 + 주요 섭동)
function moonEqu(ms){
  const d = julianDay(ms) - 2451543.5;          // Schlyter 기준일(2000 Jan 0.0)
  const rev=x=>((x%360)+360)%360;
  const sinD=x=>Math.sin(x*DEG), cosD=x=>Math.cos(x*DEG);
  // 달 궤도요소
  const N=rev(125.1228-0.0529538083*d), inc=5.1454;
  const w=rev(318.0634+0.1643573223*d), a=60.2666, e=0.054900;
  const M=rev(115.3654+13.0649929509*d);
  // 태양요소(섭동·이각용)
  const Ms=rev(356.0470+0.9856002585*d), ws=rev(282.9404+4.70935e-5*d);
  const Ls=rev(ws+Ms);
  // 이심 근점이각(뉴턴 1회)
  let E=M+e*RAD*sinD(M)*(1+e*cosD(M));
  E=E-(E-e*RAD*sinD(E)-M)/(1-e*cosD(E));
  const xv=a*(cosD(E)-e), yv=a*Math.sqrt(1-e*e)*sinD(E);
  const v=rev(Math.atan2(yv,xv)*RAD), r=Math.sqrt(xv*xv+yv*yv);
  // 황도 직교좌표
  const xh=r*(cosD(N)*cosD(v+w)-sinD(N)*sinD(v+w)*cosD(inc));
  const yh=r*(sinD(N)*cosD(v+w)+cosD(N)*sinD(v+w)*cosD(inc));
  const zh=r*(sinD(v+w)*sinD(inc));
  let lon=rev(Math.atan2(yh,xh)*RAD);
  let lat=Math.atan2(zh,Math.sqrt(xh*xh+yh*yh))*RAD;
  // 주요 섭동
  const Mm=M, Lm=rev(N+w+M), D=rev(Lm-Ls), F=rev(Lm-N);
  const s=x=>Math.sin(x*DEG);
  lon+= -1.274*s(Mm-2*D)+0.658*s(2*D)-0.186*s(Ms)-0.059*s(2*Mm-2*D)
        -0.057*s(Mm-2*D+Ms)+0.053*s(Mm+2*D)+0.046*s(2*D-Ms)+0.041*s(Mm-Ms)
        -0.035*s(D)-0.031*s(Mm+Ms)-0.015*s(2*F-2*D)+0.011*s(Mm-4*D);
  lat+= -0.173*s(F-2*D)-0.055*s(Mm-F-2*D)-0.046*s(Mm+F-2*D)+0.033*s(F+2*D)+0.017*s(2*Mm+F);
  lon=rev(lon);
  // 황도 -> 적도
  const ecl=23.4393-3.563e-7*d;
  const xg=cosD(lon)*cosD(lat), yg=sinD(lon)*cosD(lat), zg=sinD(lat);
  const xe=xg, ye=yg*cosD(ecl)-zg*sinD(ecl), ze=yg*sinD(ecl)+zg*cosD(ecl);
  const ra=rev(Math.atan2(ye,xe)*RAD), dec=Math.atan2(ze,Math.sqrt(xe*xe+ye*ye))*RAD;
  // 위상: 태양과의 이각으로 밝은 비율 계산
  const elong=rev(lon-Ls);
  const k=(1-cosD(elong))/2;                    // 밝은 면적 비율(0=삭,1=보름)
  return { ra, dec, k, waxing:(elong<180), elong };
}
function moonPhaseName(k, waxing){
  if(k<0.04) return '삭 (New)';
  if(k>0.96) return '보름 (Full)';
  if(Math.abs(k-0.5)<0.07) return waxing?'상현 (First Quarter)':'하현 (Last Quarter)';
  if(k<0.5) return waxing?'초승달 (Waxing Crescent)':'그믐달 (Waning Crescent)';
  return waxing?'상현망 (Waxing Gibbous)':'하현망 (Waning Gibbous)';
}
// 고도/방위 -> 3D 단위벡터 (x=동, y=상, z=-북)
function horToVec(altDeg, azDeg, r=1){
  const alt = altDeg*DEG, az = azDeg*DEG;
  const ca = Math.cos(alt);
  return new THREE.Vector3(ca*Math.sin(az)*r, Math.sin(alt)*r, -ca*Math.cos(az)*r);
}

   ============================================================ */
const BG_STARS = (()=>{
  const rnd = mulberry32(1234567);
  const arr = [];
  const N = 1500;
  for(let i=0;i<N;i++){
    const ra = rnd()*360;
    const dec = Math.asin(rnd()*2-1)*RAD;
    const mag = 3.6 + rnd()*rnd()*3.0;          // 3.6 ~ 6.6, 어두운 쪽으로 치우침
    const specs = ["B","A","A","F","F","G","G","K","K","M"];
    const spec = specs[Math.floor(rnd()*specs.length)];
    arr.push({ra, dec, mag, spec});
  }
  return arr;
})();

// 방위별 능선 높이(도) — 여러 주기의 사인 합으로 산맥 실루엣 생성
const _tp = (()=>{ const r=mulberry32(9911); return [0,1,2,3,4,5].map(()=>r()*Math.PI*2); })();
function terrainHeight(azDeg){
  const t = azDeg*DEG;
  const h = 6.5
    + 4.2*Math.sin(   t + _tp[0])
    + 2.6*Math.sin( 2*t + _tp[1])
    + 1.6*Math.sin( 3*t + _tp[2])
    + 1.0*Math.sin( 5*t + _tp[3])
    + 0.6*Math.sin( 8*t + _tp[4])
    + 0.4*Math.sin(13*t + _tp[5]);
  return Math.max(1.2, h);
}
// 지상: 능선을 테두리로 하고 천저(nadir)로 모이는 원뿔형 솔리드(불투명)
{

  const nadir=new THREE.Vector3(0,-0.95,0);
  const ring=[];
  for(let i=0;i<=SEG;i++){ const az=i/SEG*360; ring.push(horToVec(terrainHeight(az), az, r)); }
  for(let i=0;i<SEG;i++){
    const a=ring[i], b=ring[i+1];
    positions.push(nadir.x,nadir.y,nadir.z, a.x,a.y,a.z, b.x,b.y,b.z);

  vertexShader:`

    varying vec3 vColor; varying float vNamed; varying float vCore; varying float vHover; varying float vTw;
    uniform float uScale; uniform float uHover; uniform float uTime; uniform float uTwEnable;
    void main(){
      vColor=acolor; vNamed=aNamed; vCore=aCore;
      vHover = (aNamed>0.5 && abs(aIndex-uHover)<0.5) ? 1.0 : 0.0;
      // 반짝임: 별마다 위상이 다른 두 주파수 합성 → 불규칙한 깜빡임(uTwEnable=0이면 정지)
      float s1=sin(uTime*2.3+aTw), s2=sin(uTime*6.1+aTw*2.7);
      float amp=((vNamed<0.5)?0.45:0.18)*uTwEnable;  // 배경 별이 더 강하게 반짝임
      vTw = 1.0 - amp*(0.5+0.3*s1+0.2*s2);

      gl_Position=projectionMatrix*mv;
      float szTw=(vNamed<0.5)?(0.8+0.25*vTw):1.0;
      gl_PointSize=size*uScale*szTw*(vHover>0.5?1.4:1.0);

    uniform float uVis;
    void main(){

        float core=smoothstep(vCore,0.0,r)*(0.72+0.28*vTw);

function spawnMeteor(){
  const m=meteors.find(m=>!m.active); if(!m) return false;
  m.active=true; m.life=0;
  m.maxLife=0.9+Math.random()*0.9;
  m.alt=45+Math.random()*35;                    // 시작 고도 45~80°
  m.az=Math.random()*360;
  m.dAlt=-(28+Math.random()*30);                // 낙하 속도(°/s)
  m.dAz=(Math.random()-0.5)*70;

function updateMeteors(){
  const now=performance.now();
  const dt=Math.min((now-lastMetT)/1000, 0.05); lastMetT=now;
  if(meteorsOn && now>=nextMeteorAt){ spawnMeteor(); nextMeteorAt=now+3500+Math.random()*6500; }
  const pos=meteorGeo.attributes.position.array;
  const siz=meteorGeo.attributes.size.array;
  const alp=meteorGeo.attributes.aAlpha.array;
  meteors.forEach((m,mi)=>{
    const base=mi*MTRAIL;
    if(m.active){
      m.life+=dt;
      m.alt+=m.dAlt*dt; m.az+=m.dAz*dt;
      m.hist.unshift([m.alt,m.az]);
      if(m.hist.length>MTRAIL) m.hist.length=MTRAIL;
      if(m.life>m.maxLife || m.alt<4) m.active=false;
      // 밝기 envelope: 서서히 나타나 끝에서 사라짐
      const f=m.life/m.maxLife;
      const env=clamp(f/0.15,0,1)*clamp((1-f)/0.3,0,1);
      for(let k=0;k<MTRAIL;k++){
        const i=base+k;
        if(k<m.hist.length && m.hist[k][0]>0){
          const v=horToVec(m.hist[k][0], m.hist[k][1], 0.99);
          pos[i*3]=v.x; pos[i*3+1]=v.y; pos[i*3+2]=v.z;
          const tail=1-k/MTRAIL;
          siz[i]=(2+9*tail*tail);
          alp[i]=env*tail*tail;
        } else { alp[i]=0; siz[i]=0; }
      }

      for(let k=0;k<MTRAIL;k++){ const i=base+k; alp[i]*=0.85; if(alp[i]<0.01)alp[i]=0; }
    }
  });

  meteorGeo.attributes.size.needsUpdate=true;
  meteorGeo.attributes.aAlpha.needsUpdate=true;
}

    sizes.push(NAMED_SIZE); aNamed.push(1); aCore.push(coreFromMag(mag)); aIndex.push(idx);

    moonMat.uniforms.uDir.value=mo.waxing?1:-1;
    moonMat.uniforms.uVis.value=Math.max(vis,0.65);  // 달은 낮에도 어느 정도 보임

function applyCamera(){
  camera.fov=fov; camera.updateProjectionMatrix();
  const p=pitch*DEG, y=yaw*DEG, cp=Math.cos(p);
  const dir=new THREE.Vector3(cp*Math.sin(y), Math.sin(p), -cp*Math.cos(y));
  camera.position.set(0,0,0);
  camera.lookAt(dir);
  starMat.uniforms.uScale.value = 60/fov;
  moonMat.uniforms.uScale.value = 60/fov;

let dragging=false, lastX=0, lastY=0;
const el=renderer.domElement;
el.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; el.setPointerCapture(e.pointerId); });
el.addEventListener('pointerup',   e=>{ dragging=false; });
el.addEventListener('pointermove', e=>{
  if(dragging){
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY;
    const sens=0.12*(fov/60);
    yaw = ((yaw - dx*sens)%360+360)%360;
    pitch = clamp(pitch + dy*sens, MIN_PITCH, 88);   // 지평선 아래로는 내려가지 않음
    applyCamera();
  }
  handleHover(e.clientX, e.clientY);
});

const tooltip=$('tooltip');
const _v=new THREE.Vector3();
function handleHover(mx, my){
  let best=null, bestD=16*16;
  const W=innerWidth, H=innerHeight;
  const fwd=new THREE.Vector3(); camera.getWorldDirection(fwd);
  for(const s of visibleNamed){
    if(s.pos.dot(fwd) <= 0) continue;         // 뒤쪽 제외
    _v.copy(s.pos).project(camera);
    if(_v.z>1) continue;
    const sx=(_v.x*0.5+0.5)*W, sy=(-_v.y*0.5+0.5)*H;
    const d=(sx-mx)**2+(sy-my)**2;
    if(d<bestD){ bestD=d; best={s,sx,sy}; }
  }
  // 달 판정 (별보다 크므로 조금 넓은 반경)
  let moonHit=null;
  if(moonInfo && moonInfo.pos.dot(fwd)>0){
    _v.copy(moonInfo.pos).project(camera);
    if(_v.z<=1){
      const sx=(_v.x*0.5+0.5)*W, sy=(-_v.y*0.5+0.5)*H;
      const d=(sx-mx)**2+(sy-my)**2;
      if(d<26*26) moonHit={sx,sy,d};
    }
  }
  if(moonHit && (best===null || moonHit.d<bestD)){
    $('tt-name').textContent='달 Moon';
    $('tt-con').textContent=moonPhaseName(moonInfo.k, moonInfo.waxing);
    $('tt-mag').textContent='밝기 '+Math.round(moonInfo.k*100)+'%';
    $('tt-spec').innerHTML='<span class="swatch" style="background:#e8e6d8"></span>지구의 위성';
    $('tt-alt').textContent=`${moonInfo.alt.toFixed(1)}°`;
    $('tt-az').textContent=`${moonInfo.az.toFixed(1)}°`;
    tooltip.style.left=moonHit.sx+'px'; tooltip.style.top=moonHit.sy+'px';
    tooltip.style.opacity=1; el.style.cursor='pointer';
    starMat.uniforms.uHover.value=-1;
    return;
  }

  if(best){
    const s=best.s;
    $('tt-name').textContent=s.name;
    $('tt-con').textContent=s.con;
    $('tt-mag').textContent=s.mag.toFixed(2);
    $('tt-spec').innerHTML=`<span class="swatch" style="background:${specHex(s.spec)}"></span>${s.spec}`;
    $('tt-alt').textContent=`${s.alt.toFixed(1)}°`;
    $('tt-az').textContent=`${s.az.toFixed(1)}°`;
    tooltip.style.left=best.sx+'px'; tooltip.style.top=best.sy+'px';
    tooltip.style.opacity=1;
    el.style.cursor='pointer';
    starMat.uniforms.uHover.value = s.idx;   // 호버 별 링 강조
  } else {
    tooltip.style.opacity=0; el.style.cursor='grab';
    starMat.uniforms.uHover.value = -1;
  }
}

  const la=latDeg*DEG, lo=lonDeg*DEG;

(function loadGlobeTex(){
  const urls=[
    'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg',
    'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg'
  ];
  const loader=new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');
  (function tryLoad(i){
    if(i>=urls.length){ applyFallback(); return; }
    loader.load(urls[i], tex=>{
      tex.colorSpace=THREE.SRGBColorSpace;
      globeMat.map=tex; globeMat.needsUpdate=true; globeTexOk=true;
    }, undefined, ()=>tryLoad(i+1));
  })(0);
  function applyFallback(){
    // 바다색 + 위경도 격자 폴백 텍스처
    const c=document.createElement('canvas'); c.width=1024; c.height=512;
    const g=c.getContext('2d');
    g.fillStyle='#123a5e'; g.fillRect(0,0,1024,512);
    g.strokeStyle='rgba(160,200,255,0.35)'; g.lineWidth=1;
    for(let lo=-180;lo<=180;lo+=30){ const x=(lo+180)/360*1024; g.beginPath(); g.moveTo(x,0); g.lineTo(x,512); g.stroke(); }
    for(let la=-60;la<=60;la+=30){ const y=(90-la)/180*512; g.beginPath(); g.moveTo(0,y); g.lineTo(1024,y); g.stroke(); }
    g.strokeStyle='rgba(255,120,120,0.6)'; const ye=(90-0)/180*512;
    g.beginPath(); g.moveTo(0,ye); g.lineTo(1024,ye); g.stroke();  // 적도 강조
    const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
    globeMat.map=tex; globeMat.needsUpdate=true;
  }
})();

// 관측지 마커 (핀 + 펄스 링)
const gMarker=new THREE.Group();
gMarker.add(new THREE.Mesh(new THREE.SphereGeometry(0.028,16,12),
  new THREE.MeshBasicMaterial({ color:0xff5566 })));
const gRing=new THREE.Mesh(new THREE.RingGeometry(0.045,0.06,32),
  new THREE.MeshBasicMaterial({ color:0xff8899, transparent:true, opacity:0.9, side:THREE.DoubleSide }));
gMarker.add(gRing);
globeGroup.add(gMarker);

function globeSetMarker(latDeg,lonDeg){
  const p=llToVec(latDeg,lonDeg,1.005);
  gMarker.position.copy(p);
  gMarker.lookAt(p.clone().multiplyScalar(2));   // 링이 표면에 접하도록
}
function globeFace(latDeg,lonDeg){               // 마커가 정면에 오도록 회전
  globeGroup.rotation.y=(-90-lonDeg)*DEG;
  globeGroup.rotation.x=clamp(latDeg*DEG,-1.1,1.1);
}

/* --- 중앙 위치 설정 함수 (모든 위치 변경 경로가 여길 통과) --- */
function setLocation(la,lo,name,fromGlobe=false){
  lat=clamp(la,-90,90); lon=((lo+180)%360+360)%360-180;
  locName=name;
  $('latInput').value=lat.toFixed(2); $('lonInput').value=lon.toFixed(2);
  globeSetMarker(lat,lon);
  if(!fromGlobe) globeFace(lat,lon);   // 지구본 클릭이 아니면 마커를 정면으로
  clearTrail=true; updateSky();
}

/* --- 지구본 드래그 회전 & 클릭 선택 --- */
let gDrag=false,gX=0,gY=0,gMoved=0;
const gEl=globeRenderer.domElement;
gEl.style.cursor='grab';
gEl.addEventListener('pointerdown',e=>{
  gDrag=true; gMoved=0; gX=e.clientX; gY=e.clientY;
  try{ gEl.setPointerCapture(e.pointerId); }catch(_){}
});
gEl.addEventListener('pointermove',e=>{
  if(!gDrag) return;
  const dx=e.clientX-gX, dy=e.clientY-gY; gX=e.clientX; gY=e.clientY;
  gMoved+=Math.abs(dx)+Math.abs(dy);
  globeGroup.rotation.y+=dx*0.011;
  globeGroup.rotation.x=clamp(globeGroup.rotation.x+dy*0.011,-1.15,1.15);
});
gEl.addEventListener('pointerup',e=>{
  gDrag=false;
  if(gMoved<6) globePick(e.clientX,e.clientY);   // 드래그가 아니면 위치 선택
});
const gRay=new THREE.Raycaster();
function globePick(cx,cy){
  const rect=gEl.getBoundingClientRect();
  const nx=((cx-rect.left)/rect.width)*2-1;
  const ny=-(((cy-rect.top)/rect.height)*2-1);
  gRay.setFromCamera(new THREE.Vector2(nx,ny), globeCam);
  const hit=gRay.intersectObject(globeMesh,false)[0];
  if(!hit) return null;
  const local=globeMesh.worldToLocal(hit.point.clone());
  const {lat:la,lon:lo}=vecToLL(local);
  setLocation(la,lo,`지구본 선택 (${la.toFixed(1)}°, ${lo.toFixed(1)}°)`,true);
  return {la,lo};
}
function renderGlobe(){
  gRing.material.opacity=0.55+0.35*Math.sin(performance.now()*0.004);  // 마커 펄스
  globeRenderer.render(globeScene,globeCam);
}

/* --- 패널 최소화 & 드래그 이동 --- */
let panelZ=30;
function setupPanel(id, title, startCollapsed){
  const p=$(id);
  const ph=document.createElement('div'); ph.className='ph';
  ph.innerHTML=`<span class="grip">⠿</span><span class="pt">${title}</span><button class="pmin" title="최소화/펼치기">−</button>`;
  p.insertBefore(ph, p.firstChild);
  const btn=ph.querySelector('.pmin');
  const setCol=c=>{ p.classList.toggle('collapsed', c); btn.textContent=c?'+':'−'; };
  btn.addEventListener('click', e=>{ e.stopPropagation(); setCol(!p.classList.contains('collapsed')); });
  if(startCollapsed) setCol(true);
  // 헤더를 잡고 드래그하면 패널 이동 (화면 밖으로 못 나가게 클램프)
  let drag=false, sx=0, sy=0, ox=0, oy=0;
  ph.addEventListener('pointerdown', e=>{
    if(e.target===btn) return;
    p.style.zIndex=++panelZ;                     // 잡은 패널을 맨 위로
    const r=p.getBoundingClientRect();
    p.style.left=r.left+'px'; p.style.top=r.top+'px';
    p.style.right='auto'; p.style.bottom='auto'; p.style.transform='none';
    drag=true; sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top;
    try{ ph.setPointerCapture(e.pointerId); }catch(_){}
  });
  ph.addEventListener('pointermove', e=>{
    if(!drag) return;
    p.style.left=clamp(ox+e.clientX-sx, 2, innerWidth-52)+'px';
    p.style.top =clamp(oy+e.clientY-sy, 2, innerHeight-34)+'px';
  });
  ph.addEventListener('pointerup', ()=>{ drag=false; });
  return setCol;
}

/* --- 24시간 재생 & 궤적 --- */
let playing=false, playStartSim=0;
const play24=$('play24'), trailChk=$('trailChk');
function setTrails(on){ trailsOn=on; trailChk.checked=on; clearTrail=true; }
function startPlay24(){
  playing=true;
  playStartSim=simTime;           // 시뮬레이션 24시간 경과 판정 기준
  speed=1440;                     // 24시간 ≈ 60초
  $('speed').value='1440';
  setTrails(true);                // 궤적 자동 켜기
  // 재생 중에는 별자리선·반짝임·유성 끄기
  constShow=false; $('constChk').checked=false;
  starMat.uniforms.uTwEnable.value=0.0;
  meteorsOn=false; clearMeteors();
  play24.textContent='⏸ 정지';
  play24.classList.remove('primary');
  updateSky();
}
function stopPlay24(){
  playing=false;
  speed=1;
  $('speed').value='1';
  setTrails(false);               // 종료 시 궤적 끄고 누적 초기화
  // 재생 종료 시 별자리선·반짝임·유성 모두 켜기
  constShow=true; $('constChk').checked=true;
  starMat.uniforms.uTwEnable.value=1.0;
  meteorsOn=true;
  play24.textContent='▶ 24시간 재생';
  play24.classList.add('primary');
  updateSky();
}
function maybeAutoStop(){         // 시뮬레이션 시간으로 24시간이 지나면 자동 종료
  if(playing && simTime-playStartSim>=86400000) stopPlay24();
}
play24.addEventListener('click', ()=>{ playing? stopPlay24() : startPlay24(); });
trailChk.addEventListener('change', e=> setTrails(e.target.checked) );

   루프

let curSky = new THREE.Color(0x01030a);
function renderFrame(){
  starMat.uniforms.uTime.value=performance.now()*0.001;   // 반짝임 시간
  updateMeteors();                                        // 유성 이동/생성
  if(trailsOn){
    renderer.setRenderTarget(trailRT);
    if(clearTrail){ renderer.setClearColor(0x000000,1); renderer.clear(true,true,true); clearTrail=false; }
    renderer.render(fadeScene, orthoCam);    // 이전 프레임 감쇠
    renderer.render(starScene, camera);      // 현재 별 누적
    renderer.setRenderTarget(null);
    renderer.setClearColor(curSky,1);
    renderer.clear(true,true,true);
    renderer.render(presentScene, orthoCam); // 궤적 합성
    renderer.render(scene, camera);          // 지형/대기광/방위 라벨을 위에
  } else {
    renderer.setRenderTarget(null);
    renderer.setClearColor(curSky,1);
    renderer.clear(true,true,true);
    renderer.render(starScene, camera);      // 별 먼저
    renderer.render(scene, camera);          // 지형이 지평선 아래 별을 덮어 가림
  }
}

let lastT=performance.now(), acc=0;
function loop(now){
  const dt=Math.min(now-lastT, 100); lastT=now;
  simTime += dt*speed;
  maybeAutoStop();
  acc+=dt;
  const fast = (speed>1) || trailsOn;
  if(fast || acc>500){ acc=0; updateSky(); updateClock(); }  // 빠른 재생 시 매 프레임 갱신
  renderFrame();
  renderGlobe();
  requestAnimationFrame(loop);
}

// 디버그용 노출
window.__sky = {
  get named(){ return visibleNamed; },
  get loc(){ return {lat,lon,locName}; },
  camDir(){ const d=new THREE.Vector3(); camera.getWorldDirection(d); return d; },
  setView(y,p,f){ yaw=y; pitch=p; if(f) fov=f; applyCamera(); },
  // 테스트용: 숨겨진 탭에서 rAF가 멈춰도 수동으로 프레임을 진행
  frames(n, dtMs){ for(let i=0;i<n;i++){ simTime += dtMs*speed; maybeAutoStop(); updateSky(); renderFrame(); } updateClock(); },
  // 반짝임 검증: uTime을 강제로 바꿔 두 번 렌더 후 픽셀 차이 측정
  twinkleTest(){
    const w=200,h=150, rt=new THREE.WebGLRenderTarget(w,h);
    const shot=t=>{ starMat.uniforms.uTime.value=t;
      renderer.setRenderTarget(rt); renderer.setClearColor(0x000000,1); renderer.clear(true,true,true);
      renderer.render(starScene,camera);
      const b=new Uint8Array(w*h*4); renderer.readRenderTargetPixels(rt,0,0,w,h,b);
      renderer.setRenderTarget(null); return b; };
    const b1=shot(0.0), b2=shot(0.9);
    rt.dispose();
    let diff=0, lit=0;
    for(let i=0;i<b1.length;i+=4){ const d=Math.abs(b1[i]-b2[i])+Math.abs(b1[i+1]-b2[i+1])+Math.abs(b1[i+2]-b2[i+2]);
      if(d>10) diff++; if(b1[i]+b1[i+1]+b1[i+2]>30) lit++; }
    return { changedPixels:diff, litPixels:lit };
  },
  fx(){ return { playing, constShow, twinkle:+starMat.uniforms.uTwEnable.value, meteorsOn, trails:trailsOn,
    constChk:$('constChk').checked, constSegs:constGeo.attributes.position.count/2 }; },
  moonAt(msOverride){
    const t = (msOverride==null)? simTime : msOverride;
    const m=moonEqu(t);
    return { ra:+m.ra.toFixed(3), dec:+m.dec.toFixed(3), k:+m.k.toFixed(4), waxing:m.waxing, elong:+m.elong.toFixed(2) };
  },
  moonState(){ return { visible:moonPoints.visible, uK:+moonMat.uniforms.uK.value.toFixed(3), uDir:moonMat.uniforms.uDir.value,
    info: moonInfo?{alt:+moonInfo.alt.toFixed(2),az:+moonInfo.az.toFixed(2),k:+moonInfo.k.toFixed(3)}:null }; },
  // 화면 중앙 영역 밝기(별+달 전체). 달을 껐다 켜 차이로 달 기여 분리
  centerBright(){
    const w=160,h=160, rt=new THREE.WebGLRenderTarget(w,h);
    const shot=()=>{ renderer.setRenderTarget(rt); renderer.setClearColor(curSky,1); renderer.clear(true,true,true);
      renderer.render(starScene,camera); renderer.render(scene,camera);
      const b=new Uint8Array(w*h*4); renderer.readRenderTargetPixels(rt,0,0,w,h,b); renderer.setRenderTarget(null);
      let lit=0,sum=0; const cx=w/2,cy=h/2;
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){ if((x-cx)**2+(y-cy)**2>40*40)continue; const i=(y*w+x)*4;
        const s=b[i]+b[i+1]+b[i+2]; sum+=s; if(s>150)lit++; } return {lit,sum}; };
    const wasVis=moonPoints.visible;
    const withMoon=shot();
    moonPoints.visible=false; const noMoon=shot(); moonPoints.visible=wasVis;
    rt.dispose();
    return { withMoon, noMoon, moonLitPixels:withMoon.lit-noMoon.lit, moonBrightness:withMoon.sum-noMoon.sum };
  },
  meteor:{
    spawn(){ return spawnMeteor(); },
    state(){ return meteors.map(m=>m.active?{alt:+m.alt.toFixed(1),az:+m.az.toFixed(1),life:+m.life.toFixed(2),hist:m.hist.length}:null); },
    lit(){ const a=meteorGeo.attributes.aAlpha.array; let n=0,mx=0; for(const v of a){ if(v>0.02)n++; if(v>mx)mx=v; } return {activePts:n, maxAlpha:+mx.toFixed(2)}; }
  },
  globe:{
    texOk(){ return globeTexOk; },
    face(la,lo){ globeFace(la,lo); renderGlobe(); },
    // lat/lon → 지구본 캔버스 클라이언트 좌표 (가려짐 무시)
    project(la,lo){
      const w=llToVec(la,lo,1.005).applyMatrix4(globeGroup.matrixWorld);
      globeGroup.updateMatrixWorld(true);
      const w2=llToVec(la,lo,1.005).applyMatrix4(globeGroup.matrixWorld);
      const p=w2.project(globeCam);
      const rect=gEl.getBoundingClientRect();
      return { x: rect.left+(p.x*0.5+0.5)*rect.width, y: rect.top+(-p.y*0.5+0.5)*rect.height, ndcZ:p.z };
    },
    pickAt(cx,cy){ return globePick(cx,cy); },
    marker(){ return vecToLL(gMarker.position); },
    rot(){ return { x:globeGroup.rotation.x, y:globeGroup.rotation.y }; }
  },
  trailLit(){ const w=trailRT.width,h=trailRT.height; const buf=new Uint8Array(w*h*4);
    renderer.setRenderTarget(trailRT); renderer.readRenderTargetPixels(trailRT,0,0,w,h,buf); renderer.setRenderTarget(null);
    let n=0,maxc=0; for(let i=0;i<buf.length;i+=4){ const s=buf[i]+buf[i+1]+buf[i+2]; if(s>30) n++; if(s>maxc)maxc=s; }
    return {lit:n, total:w*h, maxBrightness:maxc}; },
  get pitch(){ return pitch; },
  namedCount(){ let n=0; const a=starGeo.attributes.aNamed.array; for(let i=0;i<a.length;i++) if(a[i]>0.5)n++; return {named:n, total:a.length}; },
  setHover(i){ starMat.uniforms.uHover.value=i; },
  scanCenter(){
    const w=241,h=241, rt=new THREE.WebGLRenderTarget(w,h);
    renderer.setRenderTarget(rt); renderer.setClearColor(0x000000,1); renderer.clear(true,true,true);
    renderer.render(starScene,camera);
    const buf=new Uint8Array(w*h*4); renderer.readRenderTargetPixels(rt,0,0,w,h,buf);
    renderer.setRenderTarget(null); rt.dispose();
    const cx=(w/2)|0, cy=(h/2)|0, line=[];
    for(let x=0;x<w;x++){ const i=(cy*w+x)*4; line.push(buf[i]+buf[i+1]+buf[i+2]); }
    return {cx, line};
  },
  constSegs(){ return { segments: constGeo.attributes.position.count/2, visible: constLines.visible }; },
  lineCheck(){
    const p=constGeo.attributes.position.array, n=p.length/3;
    let maxErr=0, unmatched=0, minY=1e9;
    for(let i=0;i<n;i++){
      const x=p[i*3],y=p[i*3+1],z=p[i*3+2];
      if(y<minY) minY=y;
      let best=1e9; for(const s of visibleNamed){ const d=(s.pos.x-x)**2+(s.pos.y-y)**2+(s.pos.z-z)**2; if(d<best)best=d; }
      best=Math.sqrt(best); if(best>maxErr)maxErr=best; if(best>1e-4)unmatched++;
    }
    return { endpoints:n, maxErrorToNearestStar:+maxErr.toFixed(6), unmatched, minEndpointY:+minY.toFixed(4) };
  },
  // 오프스크린 렌더 후 화면 상단(하늘)/하단(지상)의 밝은(별) 픽셀 수 비교
  grab(){
    const w=200,h=150, rt=new THREE.WebGLRenderTarget(w,h);
    renderer.setRenderTarget(rt); renderer.setClearColor(curSky,1); renderer.clear(true,true,true);
    renderer.render(starScene,camera); renderer.render(scene,camera);
    const buf=new Uint8Array(w*h*4); renderer.readRenderTargetPixels(rt,0,0,w,h,buf);
    renderer.setRenderTarget(null); rt.dispose();
    function band(y0,y1){ let bright=0,sum=0,n=0; for(let y=y0;y<y1;y++)for(let x=0;x<w;x++){ const i=(y*w+x)*4; const s=buf[i]+buf[i+1]+buf[i+2]; if(s>180)bright++; sum+=s; n++; } return {bright, avg:+(sum/n).toFixed(1)}; }
    // GL 좌표: y=0 이 하단(지상), y=h-1 이 상단(하늘)
    return { groundBottom: band(0, Math.floor(h*0.30)), skyTop: band(Math.floor(h*0.60), h) };
  }
};
